name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/generate-changelog.mjs --version "$GITHUB_REF_NAME" --out artifacts/CHANGELOG.md

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack
          path: |
            artifacts/*.tgz
            artifacts/CHANGELOG.md
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-pack
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/*.tgz --title "$GITHUB_REF_NAME" --notes-file artifacts/CHANGELOG.md
